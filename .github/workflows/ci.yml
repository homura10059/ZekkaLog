name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: |
          xcodebuild build \
            -project ZekkaLog.xcodeproj \
            -scheme ZekkaLog \
            -destination 'platform=iOS Simulator,name=Any iOS Simulator Device' \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project ZekkaLog.xcodeproj \
            -scheme ZekkaLog \
            -destination 'platform=iOS Simulator,name=Any iOS Simulator Device' \
            -only-testing ZekkaLogTests \
            CODE_SIGNING_ALLOWED=NO
